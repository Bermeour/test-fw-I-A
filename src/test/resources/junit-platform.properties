# ============================================================
# JUnit 5 — Configuración de ejecución paralela
# ============================================================
#
# ACTIVAR / DESACTIVAR paralelo
# true  → tests corren en paralelo (recomendado en CI con varios cores)
# false → ejecución secuencial (útil para depurar un fallo puntual)
#
junit.jupiter.execution.parallel.enabled = true

# ── Modo de paralelismo ──────────────────────────────────────
# concurrent → métodos de test de distintas clases corren en paralelo
# same_thread → todo en secuencia (útil solo para diagnóstico)
#
junit.jupiter.execution.parallel.mode.default = concurrent
junit.jupiter.execution.parallel.mode.classes.default = concurrent

# ── Estrategia de threads ────────────────────────────────────
# fixed   → número fijo de browsers en paralelo (recomendado para UI)
# dynamic → factor × nº de cores disponibles
#
# Para tests de browser usa 'fixed' para no saturar la máquina.
# Empieza con 3 y ajusta según RAM disponible (cada Chrome ≈ 150–300 MB).
#
junit.jupiter.execution.parallel.config.strategy = fixed
junit.jupiter.execution.parallel.config.fixed.parallelism = 3

# ── Sincronización de recursos compartidos ───────────────────
# Si algún test necesita exclusividad (p.ej. modificar datos compartidos),
# anótalo con @ResourceLock("nombre-recurso").
# El resto de tests sin @ResourceLock corren sin restricción.
