# =============================================================
#  Self-Healing Framework — Configuración única
# =============================================================
#
#  Este es el único archivo de configuración del framework.
#  Cubre: aplicación, driver, healing, caché, watchdog y stability.
#
#  PRIORIDAD DE VALORES (de menor a mayor):
#    1. Este archivo (valores por defecto)
#    2. System properties en tiempo de ejecución
#       mvn test -Dapp.url=http://staging.com -Ddriver.headless=true
#
#  Para CI/CD basta con pasar -D sin tocar este archivo.
# =============================================================


# ── Aplicación ────────────────────────────────────────────────
app.url=http://localhost:9000
app.project=healing_demo


# ── Servicio de self-healing ──────────────────────────────────
healing.url=http://localhost:8765
# Perfil de scoring: default | siebel | angular | legacy
healing.scoring_profile=default


# ── Driver ────────────────────────────────────────────────────
# Valores válidos: chrome, firefox, edge, ie
driver.browser=chrome
driver.headless=false
driver.timeout.element=30
driver.timeout.pageLoad=60

# Directorio donde están los ejecutables del driver descargados manualmente.
# El framework resuelve automáticamente el nombre del ejecutable según el navegador:
#   chrome  → chromedriver.exe
#   edge    → msedgedriver.exe
#   firefox → geckodriver.exe
#   ie      → IEDriverServer.exe
# Dejar vacío solo si Selenium Manager puede descargarlos (requiere acceso a internet).
driver.path=C:/Selenium/driver


# ── Proxy (dejar vacíos para deshabilitar) ────────────────────
proxy.host=
proxy.port=


# ── Chrome: argumentos extra ──────────────────────────────────
# Lista separada por comas. Ejemplos:
#   chrome.args=--window-size=1920,1080,--disable-extensions
#   chrome.args=--incognito,--lang=es
chrome.args=


# ── Chrome: preferencias (chrome://settings) ──────────────────
# Formato: chrome.pref.<clave>=<valor>
# El tipo se infiere: "true"/"false" → Boolean, números → Integer
#
# Ejemplos comunes:
#   chrome.pref.download.default_directory=/tmp/descargas
#   chrome.pref.download.prompt_for_download=false
#   chrome.pref.plugins.always_open_pdf_externally=true


# ── Caché local de reparaciones ───────────────────────────────
# Almacena en SQLite los selectores reparados para reutilizarlos sin
# llamar al servicio Python en ejecuciones posteriores.
repair.cache.enabled=true
repair.db.path=jdbc:sqlite:repair-history.db
# Días que una entrada del caché se considera válida. 0 = sin expiración.
repair.cache.ttl.days=7
# Score mínimo (0-100) para aceptar un selector del caché.
repair.cache.min.score=80


# ── Watchdog ──────────────────────────────────────────────────
# El watchdog detecta spinners, overlays y modales antes de interactuar.
watchdog.enabled=true
watchdog.loaders.block=true
watchdog.overlays.block=true
# Selectores CSS separados por comas
watchdog.loader.selectors=.loading,.spinner,.loader,[data-testid='loader']
watchdog.overlay.selectors=.modal-backdrop,.overlay,.block-ui-wrapper,.ui-widget-overlay
watchdog.modal.selectors=.modal,[role='dialog'],.ui-dialog,.popup
watchdog.error.selectors=.error,.alert,.alert-danger,.message-error,.notification-error


# ── Stability ─────────────────────────────────────────────────
# Controla el comportamiento de StabilityWait y las acciones estables.
stability.timeout.seconds=8
stability.polling.millis=250
stability.max.retries=0
stability.wait.document.ready=true
# Activar si la app usa jQuery (espera a que $.active == 0)
stability.wait.jquery=false
stability.fast.recovery.seconds=2
stability.cache.window.millis=800